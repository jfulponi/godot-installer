name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create a GitHub release"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            name: windows
            artifact: godot-installer-windows.exe
          - os: ubuntu-latest
            name: linux
            artifact: godot-installer-linux
          - os: macos-latest
            name: macos
            artifact: godot-installer-macos

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.name }})

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies (Linux)
        if: matrix.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Install Windows extras
        if: matrix.name == 'windows'
        run: pip install pywin32

      - name: Build executable
        run: |
          pyinstaller \
            --onefile \
            --windowed \
            --name godot-installer \
            --add-data "src/godot_installer:godot_installer" \
            --hidden-import=godot_installer \
            --hidden-import=godot_installer.app \
            --hidden-import=godot_installer.versions \
            --hidden-import=godot_installer.shortcuts \
            --hidden-import=godot_installer.paths \
            --hidden-import=godot_installer.config \
            --hidden-import=godot_installer.tabs \
            --hidden-import=godot_installer.tabs.install_tab \
            --hidden-import=godot_installer.tabs.installed_tab \
            --hidden-import=godot_installer.tabs.settings_tab \
            --hidden-import=customtkinter \
            --hidden-import=PIL \
            --collect-all customtkinter \
            src/godot_installer/app.py
        shell: bash

      - name: Rename artifact (Linux/macOS)
        if: matrix.name != 'windows'
        run: mv dist/godot-installer dist/${{ matrix.artifact }}

      - name: Rename artifact (Windows)
        if: matrix.name == 'windows'
        run: mv dist/godot-installer.exe dist/${{ matrix.artifact }}
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          cp artifacts/godot-installer-windows.exe/godot-installer-windows.exe release/
          cp artifacts/godot-installer-linux/godot-installer-linux release/
          cp artifacts/godot-installer-macos/godot-installer-macos release/
          chmod +x release/godot-installer-linux release/godot-installer-macos

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
