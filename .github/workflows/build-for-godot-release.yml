name: Build for Godot Release

on:
  workflow_call:
    inputs:
      godot_version:
        required: true
        type: string
  repository_dispatch:
    types: [new-godot-release]
  workflow_dispatch:
    inputs:
      godot_version:
        description: "Godot version tag (e.g., 4.4-stable)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            name: windows
            ext: .exe
          - os: ubuntu-latest
            name: linux
            ext: ""
          - os: macos-latest
            name: macos
            ext: ""

    runs-on: ${{ matrix.os }}
    name: Build installer (${{ matrix.name }})

    env:
      GODOT_VERSION: ${{ inputs.godot_version || github.event.client_payload.godot_version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies (Linux)
        if: matrix.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Install Windows extras
        if: matrix.name == 'windows'
        run: pip install pywin32

      - name: Build executable
        run: |
          pyinstaller \
            --onefile \
            --windowed \
            --name "godot-installer-${{ env.GODOT_VERSION }}-${{ matrix.name }}" \
            --add-data "src/godot_installer:godot_installer" \
            --hidden-import=godot_installer \
            --hidden-import=godot_installer.app \
            --hidden-import=godot_installer.versions \
            --hidden-import=godot_installer.shortcuts \
            --hidden-import=godot_installer.paths \
            --hidden-import=godot_installer.config \
            --hidden-import=godot_installer.tabs \
            --hidden-import=godot_installer.tabs.install_tab \
            --hidden-import=godot_installer.tabs.installed_tab \
            --hidden-import=godot_installer.tabs.settings_tab \
            --hidden-import=customtkinter \
            --hidden-import=PIL \
            --collect-all customtkinter \
            src/godot_installer/app.py
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.name }}-${{ env.GODOT_VERSION }}
          path: dist/godot-installer-*

  release:
    needs: build
    runs-on: ubuntu-latest

    env:
      GODOT_VERSION: ${{ inputs.godot_version || github.event.client_payload.godot_version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          chmod +x release/godot-installer-*-linux release/godot-installer-*-macos 2>/dev/null || true
          ls -la release/

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="godot-${GODOT_VERSION}"
          gh release create "$TAG" \
            --title "Godot Installer for ${GODOT_VERSION}" \
            --notes "Pre-built installers for Godot Engine ${GODOT_VERSION}.

          Download the file for your platform:
          - **Windows**: \`godot-installer-${GODOT_VERSION}-windows.exe\`
          - **Linux**: \`godot-installer-${GODOT_VERSION}-linux\`
          - **macOS**: \`godot-installer-${GODOT_VERSION}-macos\`

          Run the installer and it will download, extract, and set up Godot ${GODOT_VERSION} with desktop shortcuts.
          " \
            --repo ${{ github.repository }} \
            release/godot-installer-* || \
          gh release upload "$TAG" release/godot-installer-* --repo ${{ github.repository }} --clobber
